name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: amd64
            ext: .exe
          - os: macos
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-arm
            goos: darwin
            goarch: arm64
            ext: ""
          - os: linux
            goos: linux
            goarch: amd64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o automodel-for-cc${{ matrix.ext }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: automodel-for-cc-${{ matrix.os }}
          path: automodel-for-cc${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            automodel-for-cc-windows/automodel-for-cc.exe
            automodel-for-cc-macos/automodel-for-cc
            automodel-for-cc-macos-arm/automodel-for-cc
            automodel-for-cc-linux/automodel-for-cc
