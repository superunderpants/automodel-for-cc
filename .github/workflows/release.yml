name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: windows
            goos: windows
            goarch: amd64
            binary: automodel-for-cc-windows-amd64.exe
          - os: macos
            goos: darwin
            goarch: amd64
            binary: automodel-for-cc-darwin-amd64
          - os: macos-arm
            goos: darwin
            goarch: arm64
            binary: automodel-for-cc-darwin-arm64
          - os: linux
            goos: linux
            goarch: amd64
            binary: automodel-for-cc-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.binary }} ./src/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            automodel-for-cc-windows-amd64.exe/automodel-for-cc-windows-amd64.exe
            automodel-for-cc-darwin-amd64/automodel-for-cc-darwin-amd64
            automodel-for-cc-darwin-arm64/automodel-for-cc-darwin-arm64
            automodel-for-cc-linux-amd64/automodel-for-cc-linux-amd64
